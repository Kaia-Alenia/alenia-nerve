name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Validate tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(grep '^version = ' clients/python/pyproject.toml | head -n 1 | sed -E 's/version = \"([^\"]+)\"/\1/')"

          if [[ -z "$PACKAGE_VERSION" ]]; then
            echo "::error::Could not read package version from clients/python/pyproject.toml"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match pyproject version '$PACKAGE_VERSION'."
            exit 1
          fi
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build

      - name: Build binary wheel and source tarball
        working-directory: clients/python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          packages-dir: clients/python/dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: clients/python/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
